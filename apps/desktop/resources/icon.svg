<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8fff"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="screen1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="screen2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Connection line (behind screens) -->
  <path d="M 190 280 C 256 220, 256 220, 322 280"
        stroke="url(#glow)" stroke-width="4" fill="none"
        filter="url(#glowFilter)" opacity="0.8"/>

  <!-- Glowing dots on connection -->
  <circle cx="220" cy="258" r="4" fill="#4f8fff" filter="url(#glowFilter)"/>
  <circle cx="256" cy="238" r="5" fill="#60a5fa" filter="url(#glowFilter)"/>
  <circle cx="292" cy="258" r="4" fill="#38bdf8" filter="url(#glowFilter)"/>

  <!-- Left monitor (host) -->
  <g filter="url(#shadow)" transform="translate(-30, 0)">
    <!-- Monitor body -->
    <rect x="100" y="140" width="160" height="110" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Screen -->
    <rect x="108" y="148" width="144" height="86" rx="4" ry="4" fill="url(#screen1)" opacity="0.9"/>
    <!-- Screen content lines -->
    <rect x="120" y="164" width="60" height="4" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="120" y="176" width="80" height="4" rx="2" fill="#fff" opacity="0.25"/>
    <rect x="120" y="188" width="50" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="120" y="200" width="70" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <!-- Monitor stand -->
    <rect x="164" y="250" width="32" height="16" rx="2" fill="#334155"/>
    <rect x="148" y="262" width="64" height="6" rx="3" fill="#334155"/>
  </g>

  <!-- Right monitor (viewer) -->
  <g filter="url(#shadow)" transform="translate(30, 0)">
    <!-- Monitor body -->
    <rect x="252" y="140" width="160" height="110" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Screen -->
    <rect x="260" y="148" width="144" height="86" rx="4" ry="4" fill="url(#screen2)" opacity="0.9"/>
    <!-- Screen content (cursor) -->
    <polygon points="310,172 310,198 320,190 328,202 334,198 326,186 336,182" fill="#fff" opacity="0.6"/>
    <!-- Monitor stand -->
    <rect x="316" y="250" width="32" height="16" rx="2" fill="#334155"/>
    <rect x="300" y="262" width="64" height="6" rx="3" fill="#334155"/>
  </g>

  <!-- "N" letter subtle watermark -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
        font-size="48" fill="#fff" opacity="0.15" letter-spacing="8">NEXULON</text>

  <!-- Bottom connection indicator -->
  <circle cx="256" cy="400" r="8" fill="#22c55e" opacity="0.8"/>
  <circle cx="256" cy="400" r="14" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="400" r="20" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.15"/>
</svg>
